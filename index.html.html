<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --f9:#0d1f14;--f8:#152a1c;--f7:#1c3622;--f6:#24422a;
  --f5:#2f5438;--f4:#3d6b49;--f3:#5a8c6a;--f2:#8dbda0;
  --ch:#d6c8b4;--chl:#e8ddd0;--chp:#f3ede5;--chs:#faf6f0;
  --gold:#b89440;--goldl:#d4aa55;--goldp:rgba(184,148,64,.13);
  --white:#fff;--off:#fdfaf6;
  --t1:#111310;--t2:#2d2e2a;--t3:#484944;--t4:#6b6c66;
  --t5:#979890;--t6:#c0c1b9;
  --ln:#e0dbd2;--lns:#eae5dc;
  --ok:#15803d;--okbg:#dcfce7;
  --warn:#92400e;--warnbg:#fef3c7;
  --err:#991b1b;--errbg:#fee2e2;
  --info:#1e40af;--infobg:#dbeafe;
  --purple:#5b21b6;--purplebg:#ede9fe;
  --r:12px;--rs:8px;
  --sb:232px;
  --sh:0 1px 3px rgba(13,31,20,.06),0 1px 2px rgba(13,31,20,.04);
  --sh2:0 4px 16px rgba(13,31,20,.09);
  --sh3:0 12px 48px rgba(13,31,20,.13);
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html,body{height:100%;font-family:'Outfit',sans-serif;font-size:14px;color:var(--t1);background:var(--chs);-webkit-font-smoothing:antialiased;}
::selection{background:var(--f5);color:var(--ch);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--chl);border-radius:4px;}
.app{display:flex;height:100vh;overflow:hidden;}

/* ══ SIDEBAR ══ */
.sidebar{width:var(--sb);background:var(--f9);display:flex;flex-direction:column;flex-shrink:0;position:relative;overflow:hidden;}
.sidebar::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 160% 50% at 100% 0%,rgba(184,148,64,.08),transparent 55%),
  radial-gradient(ellipse 100% 60% at 0% 100%,rgba(45,84,56,.2),transparent 55%);}
.sidebar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(214,200,180,.13) 20%,rgba(214,200,180,.13) 80%,transparent);}

.logo-area{padding:22px 20px 18px;border-bottom:1px solid rgba(214,200,180,.1);}
.logo-row{display:flex;align-items:center;gap:11px;}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--f5),var(--f3));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.25);border:1px solid rgba(214,200,180,.15);}
.logo-icon svg{width:16px;height:16px;stroke:var(--ch);fill:none;stroke-width:1.6;}
.logo-name{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--ch);letter-spacing:.5px;line-height:1;}
.logo-name em{color:var(--goldl);font-style:italic;}
.logo-tag{font-size:8px;color:rgba(214,200,180,.35);letter-spacing:3.5px;text-transform:uppercase;margin-top:5px;}

.nav{flex:1;padding:10px 0 8px;overflow-y:auto;}
.nav-sec{padding:13px 20px 4px;font-size:8px;color:rgba(214,200,180,.3);letter-spacing:3px;text-transform:uppercase;font-weight:700;}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 20px;cursor:pointer;
  color:rgba(214,200,180,.5);font-size:12.5px;font-weight:400;
  transition:all .15s var(--ease);border-left:2px solid transparent;user-select:none;}
.nav-item:hover{color:rgba(214,200,180,.88);background:rgba(214,200,180,.055);}
.nav-item.active{color:var(--ch);font-weight:500;
  background:linear-gradient(90deg,rgba(184,148,64,.16),rgba(184,148,64,.03));
  border-left-color:var(--goldl);}
.ni{width:14px;height:14px;flex-shrink:0;opacity:.6;transition:opacity .15s;}
.nav-item:hover .ni,.nav-item.active .ni{opacity:1;}
.nbadge{margin-left:auto;border-radius:20px;padding:2px 7px;font-size:9.5px;font-weight:700;}
.nb-n{background:rgba(214,200,180,.12);color:rgba(214,200,180,.5);}
.nb-h{background:rgba(220,38,38,.2);color:#fca5a5;}
.nb-g{background:var(--goldp);color:var(--goldl);}

.sb-foot{padding:13px 20px;border-top:1px solid rgba(214,200,180,.1);}
.sb-u{display:flex;align-items:center;gap:9px;}
.sb-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--f5),var(--f3));
  border:1.5px solid rgba(214,200,180,.2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:13px;color:var(--ch);}
.sb-name{font-size:12px;color:rgba(214,200,180,.75);font-weight:500;}
.sb-role{font-size:10px;color:rgba(214,200,180,.28);margin-top:1px;}
.sb-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 5px rgba(34,197,94,.5);margin-left:auto;flex-shrink:0;}

/* ══ MAIN ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:rgba(253,250,246,.95);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--lns);padding:0 28px;height:54px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
.tb-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--f7);}
.tb-r{display:flex;align-items:center;gap:8px;}
.chip{display:flex;align-items:center;gap:5px;background:var(--lns);border-radius:20px;
  padding:4px 11px;font-size:11.5px;color:var(--t4);border:1px solid var(--ln);}
.chip-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;}
.bell-wrap{position:relative;}
.bell-btn{width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t4);border:1px solid var(--ln);background:var(--white);transition:all .15s;position:relative;}
.bell-btn:hover{background:var(--chp);color:var(--f7);}
.bell-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;
  background:#ef4444;border:2px solid var(--off);display:none;}
.add-dd{position:absolute;top:calc(100% + 8px);right:0;width:320px;
  background:var(--white);border:1px solid var(--ln);border-radius:var(--r);
  box-shadow:var(--sh3);z-index:500;overflow:hidden;}
.add-hdr{padding:11px 16px;font-size:10px;font-weight:700;color:var(--f7);
  text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--lns);
  background:var(--chp);display:flex;justify-content:space-between;align-items:center;}
.add-row{padding:10px 16px;border-bottom:1px solid var(--lns);display:flex;gap:10px;
  align-items:flex-start;transition:background .1s;cursor:default;}
.add-row:hover{background:var(--chs);}
.add-row:last-child{border-bottom:none;}
.add-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.add-ttl{font-size:12.5px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.add-desc{font-size:11.5px;color:var(--t3);}
.add-meta{font-size:10.5px;color:var(--t5);margin-top:2px;}

.content{flex:1;overflow-y:auto;padding:24px 28px 40px;}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);
  font-size:12.5px;font-weight:500;cursor:pointer;border:none;
  transition:all .15s var(--ease);font-family:'Outfit',sans-serif;}
.btn-primary{background:var(--f7);color:var(--ch);box-shadow:0 2px 6px rgba(13,31,20,.2);}
.btn-primary:hover{background:var(--f5);transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,31,20,.24);}
.btn-primary:active{transform:none;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldl));color:var(--white);box-shadow:0 2px 8px rgba(184,148,64,.28);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(184,148,64,.38);}
.btn-ghost{background:var(--white);color:var(--t2);border:1px solid var(--ln);}
.btn-ghost:hover{background:var(--chp);border-color:var(--ch);color:var(--f7);}
.btn-danger{background:var(--errbg);color:var(--err);border:1px solid #fecaca;}
.btn-sm{padding:5px 11px;font-size:11.5px;}
.btn svg{width:13px;height:13px;}

/* ══ CARDS ══ */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--lns);padding:20px;box-shadow:var(--sh);transition:box-shadow .18s;}
.card:hover{box-shadow:var(--sh2);}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:8px;}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;color:var(--f7);}
.card-sub{font-size:11px;color:var(--t5);margin-top:2px;}

/* ══ STAT CARDS ══ */
.sgrid{display:grid;gap:12px;margin-bottom:20px;}
.s4{grid-template-columns:repeat(4,1fr);}
.s3{grid-template-columns:repeat(3,1fr);}
.s2{grid-template-columns:repeat(2,1fr);}
.stat{background:var(--white);border-radius:var(--r);border:1px solid var(--lns);
  padding:18px;box-shadow:var(--sh);position:relative;overflow:hidden;
  transition:all .18s var(--ease);}
.stat:hover{box-shadow:var(--sh2);transform:translateY(-2px);}
.stat-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.sg{background:linear-gradient(90deg,var(--f7),var(--f3));}
.sr{background:linear-gradient(90deg,#dc2626,#f87171);}
.so{background:linear-gradient(90deg,var(--gold),var(--goldl));}
.sb2{background:linear-gradient(90deg,#2563eb,#60a5fa);}
.sp{background:linear-gradient(90deg,var(--purple),#8b5cf6);}
.stat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.sig{background:rgba(28,54,34,.08);}
.sir{background:rgba(220,38,38,.08);}
.sio{background:var(--goldp);}
.sib{background:rgba(37,99,235,.08);}
.sip{background:rgba(91,33,182,.08);}
.stat-lbl{font-size:10px;font-weight:700;color:var(--t5);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;color:var(--f7);line-height:1;}
.stat-val.neg{color:var(--err);}
.stat-val.pos{color:var(--ok);}
.stat-meta{font-size:11px;color:var(--t5);margin-top:5px;}

/* ══ META BAR ══ */
.meta-wrap{background:var(--white);border-radius:var(--r);border:1px solid var(--lns);
  padding:18px 22px;box-shadow:var(--sh);margin-bottom:20px;}
.meta-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
.meta-achieved{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;color:var(--f7);line-height:1;}
.meta-of{font-size:12px;color:var(--t5);margin-top:4px;}
.meta-pct{font-size:24px;font-weight:700;font-family:'Playfair Display',serif;}
.meta-sub{font-size:11px;color:var(--t5);text-align:right;margin-top:2px;}
.mbar{height:9px;background:var(--lns);border-radius:9px;overflow:hidden;}
.mbar-fill{height:100%;background:linear-gradient(90deg,var(--f7),var(--f3));border-radius:9px;transition:width .7s var(--ease);}

/* ══ BADGES ══ */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;}
.b-green{background:var(--okbg);color:var(--ok);}
.b-amber{background:var(--warnbg);color:var(--warn);}
.b-red{background:var(--errbg);color:var(--err);}
.b-blue{background:var(--infobg);color:var(--info);}
.b-gray{background:var(--lns);color:var(--t3);}
.b-forest{background:rgba(28,54,34,.09);color:var(--f7);}
.b-gold{background:var(--goldp);color:var(--gold);}
.b-purple{background:var(--purplebg);color:var(--purple);}

/* BADGES DE SERVIÇO */
.svc-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.svc-redes{background:rgba(37,99,235,.1);color:#1d4ed8;}
.svc-trafego{background:var(--warnbg);color:var(--warn);}
.svc-foto{background:var(--purplebg);color:var(--purple);}
.svc-id{background:var(--goldp);color:var(--gold);}
.svc-mkt{background:var(--okbg);color:var(--ok);}
.svc-outro{background:var(--lns);color:var(--t3);}

/* BADGES DE COBRANÇA */
.cob-mensal{background:rgba(28,54,34,.09);color:var(--f7);}
.cob-avulso{background:var(--purplebg);color:var(--purple);}
.cob-misto{background:var(--goldp);color:var(--gold);}

/* ══ PROGRESS ══ */
.prog{height:5px;background:var(--lns);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--f7),var(--f3));border-radius:5px;transition:width .4s var(--ease);}

/* ══ FORMS ══ */
.fg{margin-bottom:13px;}
.fl{display:block;font-size:10px;font-weight:700;color:var(--t4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px;}
.fi,.fs,.fta{width:100%;padding:8px 11px;border:1.5px solid var(--ln);border-radius:var(--rs);
  font-size:13px;color:var(--t1);background:var(--white);font-family:'Outfit',sans-serif;outline:none;transition:all .18s;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--f5);box-shadow:0 0 0 3px rgba(28,54,34,.07);}
.fi:hover,.fs:hover{border-color:var(--ch);}
.fta{resize:vertical;min-height:68px;line-height:1.55;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fhint{font-size:10.5px;color:var(--t5);margin-top:3px;}

/* ══ MODAL ══ */
.modal-bg{position:fixed;inset:0;background:rgba(10,20,13,.52);display:flex;align-items:center;
  justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(5px);}
.modal{background:var(--white);border-radius:var(--r);padding:26px;width:100%;max-width:500px;
  max-height:92vh;overflow-y:auto;box-shadow:var(--sh3);border:1px solid var(--lns);}
.m-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;color:var(--f7);
  margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--lns);}
.m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--lns);}
.hidden{display:none!important;}

/* ══ TABLE ══ */
.tw{background:var(--white);border-radius:var(--r);border:1px solid var(--lns);overflow:hidden;box-shadow:var(--sh);}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 14px;text-align:left;font-size:9.5px;font-weight:700;color:var(--t5);
  text-transform:uppercase;letter-spacing:.7px;background:var(--chs);border-bottom:1px solid var(--lns);}
tbody td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--lns);vertical-align:middle;color:var(--t2);}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;}
tbody tr:hover td{background:var(--chp);}

/* ══ KANBAN ══ */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;height:calc(100vh - 140px);}
.kcol{background:var(--chs);border-radius:var(--r);border:1px solid var(--lns);padding:13px;display:flex;flex-direction:column;overflow:hidden;}
.kcol-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.kcol-title{font-size:10.5px;font-weight:700;color:var(--f7);display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.9px;}
.kpip{width:8px;height:8px;border-radius:50%;}
.kcount{font-size:10px;font-weight:700;background:var(--white);color:var(--t4);border:1px solid var(--ln);border-radius:20px;padding:2px 8px;}
.kcards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
.kcard{background:var(--white);border-radius:var(--rs);border:1px solid var(--lns);padding:13px;
  transition:all .18s var(--ease);box-shadow:var(--sh);position:relative;overflow:hidden;}
.kcard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.kcard.todo::before{background:var(--gold);}
.kcard.doing::before{background:#3b82f6;}
.kcard.done::before{background:var(--f3);}
.kcard:hover{box-shadow:var(--sh2);transform:translateY(-1px);}
.kcard-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px;line-height:1.35;}
.kcard-meta{font-size:11px;color:var(--t5);margin-bottom:8px;display:flex;align-items:center;gap:3px;}
.kcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.ktag{background:var(--chs);color:var(--t4);font-size:9.5px;padding:2px 6px;border-radius:20px;border:1px solid var(--lns);}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;}
.kadd{text-align:center;padding:8px;border:1.5px dashed var(--ln);border-radius:var(--rs);
  color:var(--t6);font-size:11.5px;cursor:pointer;margin-top:8px;transition:all .15s;}
.kadd:hover{background:var(--white);color:var(--f5);border-color:var(--f4);border-style:solid;}

/* ══ CALENDAR ══ */
.cg{display:grid;grid-template-columns:repeat(7,1fr);border-radius:var(--r);overflow:hidden;border:1px solid var(--lns);box-shadow:var(--sh);}
.chdr{background:var(--f7);color:var(--ch);text-align:center;padding:9px 4px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.cd{background:var(--white);min-height:86px;padding:6px;border-right:1px solid var(--lns);border-bottom:1px solid var(--lns);transition:background .1s;}
.cd:hover{background:var(--chp);}
.cd.dim{background:var(--chs);}
.cd.tod{background:rgba(36,66,42,.04);}
.cdn{font-size:11.5px;font-weight:600;color:var(--t5);margin-bottom:3px;}
.cd.tod .cdn{color:var(--f5);font-weight:800;}
.tbadge{background:var(--f7);color:var(--ch);border-radius:8px;padding:0 5px;font-size:8px;margin-left:3px;font-weight:700;}
.cev{font-size:9.5px;border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ce-f{background:rgba(28,54,34,.09);color:var(--f7);}
.ce-b{background:#dbeafe;color:#1d4ed8;}
.ce-a{background:#fef3c7;color:#92400e;}
.ce-g{background:var(--goldp);color:var(--gold);}
.ce-r{background:#fee2e2;color:#991b1b;}
.ce-p{background:var(--purplebg);color:var(--purple);}

/* ══ PANEL ══ */
.panel-bg{position:fixed;inset:0;background:rgba(10,20,13,.22);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(2px);}
.panel-bg.open{opacity:1;pointer-events:all;}
.panel{position:fixed;top:0;right:0;bottom:0;width:400px;background:var(--white);
  box-shadow:var(--sh3);z-index:201;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .26s var(--ease);border-left:1px solid var(--lns);}
.panel.open{transform:translateX(0);}
.p-head{padding:18px 22px;border-bottom:1px solid var(--lns);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;background:var(--chs);}
.p-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;color:var(--f7);}
.p-sub{font-size:12px;color:var(--t5);margin-top:3px;}
.p-body{flex:1;overflow-y:auto;padding:18px 22px;}
.prow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--lns);}
.pk{font-size:11.5px;color:var(--t5);}
.pv{font-size:13px;font-weight:500;}
.pfin{background:rgba(28,54,34,.03);border-radius:var(--rs);padding:14px;margin:12px 0;border:1px solid var(--lns);}
.pfin-t{font-size:9.5px;font-weight:700;color:var(--f7);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:22px;right:22px;background:var(--f7);color:var(--ch);
  padding:11px 18px;border-radius:var(--rs);font-size:13px;box-shadow:var(--sh3);z-index:2000;
  transform:translateY(80px);opacity:0;transition:all .26s var(--ease);
  max-width:300px;border-left:3px solid var(--goldl);}
.toast.show{transform:translateY(0);opacity:1;}

/* ══ INFO BAR ══ */
.ibar{background:linear-gradient(90deg,rgba(184,148,64,.07),rgba(184,148,64,.02));
  border:1px solid rgba(184,148,64,.18);border-radius:var(--rs);
  padding:10px 14px;font-size:12.5px;color:var(--f7);
  margin-bottom:18px;display:flex;align-items:center;gap:9px;line-height:1.4;}

/* ══ ALERT CARDS ══ */
.ac{border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;display:flex;gap:11px;
  align-items:flex-start;border:1px solid transparent;transition:transform .12s;}
.ac:hover{transform:translateX(3px);}
.ac.urgente{background:#fff5f5;border-color:#fecaca;}
.ac.aviso{background:#fffbeb;border-color:#fde68a;}
.ac.ok{background:#f0fdf4;border-color:#a7f3d0;}
.ac.info{background:#eff6ff;border-color:#bfdbfe;}
.ac-icon{font-size:16px;flex-shrink:0;}
.ac-txt{font-size:12.5px;line-height:1.4;color:var(--t2);}
.ac-txt strong{display:block;font-weight:600;color:var(--t1);margin-bottom:2px;}

/* ══ PLANNER ══ */
.pw{border:1px solid var(--lns);border-radius:var(--r);overflow:auto;background:var(--white);max-height:calc(100vh - 205px);box-shadow:var(--sh);}
.pgrid{display:grid;grid-template-columns:148px repeat(31,1fr);}
.p-corner{background:var(--chs);border-bottom:1px solid var(--lns);border-right:1px solid var(--lns);
  padding:9px 11px;font-size:9.5px;font-weight:700;color:var(--t5);text-transform:uppercase;
  letter-spacing:.5px;position:sticky;left:0;z-index:3;}
.p-dhdr{background:var(--chs);border-bottom:1px solid var(--lns);border-right:1px solid var(--lns);
  padding:7px 2px;text-align:center;font-size:9.5px;font-weight:600;color:var(--t4);min-width:32px;}
.p-dhdr.wk{background:var(--goldp);color:var(--gold);}
.p-dhdr.td{background:rgba(28,54,34,.1);color:var(--f7);font-weight:800;}
.p-cli{background:var(--chs);border-bottom:1px solid var(--lns);border-right:1px solid var(--lns);
  padding:7px 11px;font-size:11px;font-weight:500;color:var(--f7);position:sticky;left:0;z-index:2;display:flex;align-items:center;gap:6px;}
.p-cell{border-bottom:1px solid var(--lns);border-right:1px solid var(--lns);min-width:32px;height:42px;
  padding:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .08s;}
.p-cell:hover{background:var(--chp);}
.p-cell.wk{background:rgba(184,148,64,.02);}
.p-cell.td{background:rgba(28,54,34,.04);}
.pdot{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:transform .12s;}
.pdot:hover{transform:scale(1.1);}
.pd-feed{background:#dcfce7;color:#166534;}
.pd-stories{background:#dbeafe;color:#1d4ed8;}
.pd-reels{background:#ede9fe;color:#5b21b6;}
.pd-trafego{background:#fef9c3;color:#854d0e;}
.pd-reuniao{background:rgba(28,54,34,.09);color:var(--f7);}
.pd-evento{background:var(--goldp);color:var(--gold);}
.pd-foto{background:var(--purplebg);color:var(--purple);}

/* ══ CHECKLIST ══ */
.ci{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--rs);transition:background .1s;cursor:pointer;}
.ci:hover{background:var(--chs);}
.cbox{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--ln);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--white);}
.cbox.ck{background:var(--f7);border-color:var(--f7);}
.cbox.ck::after{content:'✓';font-size:10px;color:var(--ch);}
.clbl{font-size:13px;color:var(--t1);flex:1;}
.clbl.done{text-decoration:line-through;color:var(--t5);}
.cpbar{height:4px;background:var(--lns);border-radius:4px;margin:0 11px 9px;overflow:hidden;}
.cpfill{height:100%;background:linear-gradient(90deg,var(--f7),var(--f3));border-radius:4px;transition:width .4s;}

/* ══ NOTES ══ */
.narea{width:100%;min-height:120px;padding:11px;border:1.5px solid var(--ln);border-radius:var(--rs);
  font-family:'Outfit',sans-serif;font-size:13px;color:var(--t1);line-height:1.65;
  resize:vertical;background:var(--chs);outline:none;transition:all .18s;}
.narea:focus{border-color:var(--f5);background:var(--white);box-shadow:0 0 0 3px rgba(28,54,34,.06);}

/* ══ PROPOSAL ══ */
.pp{background:var(--white);border:1px solid var(--lns);border-radius:var(--r);padding:28px;
  font-size:13px;color:var(--t2);line-height:1.7;box-shadow:var(--sh2);}
.pp-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--f7);letter-spacing:2px;text-transform:uppercase;}
.pp-logo em{color:var(--gold);font-style:italic;}
.pp-div{height:1px;background:linear-gradient(90deg,var(--f7),var(--ch),transparent);margin:12px 0;}
.pp-h{font-family:'Playfair Display',serif;font-size:17px;color:var(--f7);margin:16px 0 7px;}
.pp-sec{margin:11px 0;padding:13px;background:var(--chs);border-radius:var(--rs);border:1px solid var(--lns);}
.ppt{width:100%;border-collapse:collapse;margin:7px 0;}
.ppt th{text-align:left;padding:7px 9px;background:var(--f7);color:var(--ch);font-size:11px;font-weight:600;}
.ppt td{padding:7px 9px;border-bottom:1px solid var(--lns);font-size:12.5px;}
.pptotal{display:flex;justify-content:space-between;padding:11px 13px;
  background:linear-gradient(135deg,var(--f7),var(--f5));color:var(--ch);
  border-radius:var(--rs);margin-top:9px;font-weight:600;}
.pptotal span:last-child{font-family:'Playfair Display',serif;font-size:17px;}

/* ══ FIN TABS ══ */
.ftabs{display:flex;gap:2px;background:var(--chp);padding:3px;border-radius:var(--rs);
  width:fit-content;margin-bottom:14px;border:1px solid var(--ln);}
.ftab{padding:5px 15px;border-radius:7px;font-size:12.5px;cursor:pointer;color:var(--t4);transition:all .15s;}
.ftab.active{background:var(--white);color:var(--f7);font-weight:600;box-shadow:var(--sh);}

/* ══ SECTION LABEL ══ */
.slbl{font-size:9.5px;font-weight:800;color:var(--t5);text-transform:uppercase;letter-spacing:1px;
  display:flex;align-items:center;gap:8px;margin-bottom:9px;margin-top:4px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--lns);}

/* ══ DASHBOARD GRID ══ */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.cwrap{position:relative;height:155px;}

/* ══ AVATAR ══ */
.av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:13px;font-weight:600;flex-shrink:0;}
.a1{background:rgba(28,54,34,.1);color:var(--f7);}
.a2{background:#dbeafe;color:#1e40af;}
.a3{background:#ede9fe;color:#5b21b6;}
.a4{background:#fef9c3;color:#854d0e;}
.a5{background:#fce7f3;color:#9d174d;}

/* ══ ORNAMENT ══ */
.orn{display:flex;align-items:center;gap:8px;color:var(--t6);font-size:11px;margin:11px 0 6px;}
.orn::before,.orn::after{content:'';flex:1;height:1px;background:var(--lns);}

/* ══ SERVIÇO CHIPS ══ */
.svc-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}

/* ══ COBRANÇA TABLE ══ */
.cob-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--lns);}
.cob-row:last-child{border-bottom:none;}

/* ══ ANIM ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeUp .22s var(--ease);}

/* ══ HAMBURGER ══ */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;border-radius:8px;border:1px solid var(--ln);background:var(--white);}
.hamburger span{display:block;width:18px;height:2px;background:var(--f7);border-radius:2px;transition:all .25s var(--ease);}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,20,.45);z-index:99;backdrop-filter:blur(2px);}
.mob-overlay.open{display:block;}

/* ══ BOTTOM NAV ══ */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--f9);border-top:1px solid rgba(214,200,180,.15);z-index:90;padding-bottom:env(safe-area-inset-bottom);}
.bottom-nav-items{display:flex;align-items:center;justify-content:space-around;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;cursor:pointer;color:rgba(214,200,180,.45);flex:1;transition:color .15s;}
.bnav-item.active,.bnav-item:hover{color:var(--goldl);}
.bnav-item svg{width:20px;height:20px;flex-shrink:0;}
.bnav-item span{font-size:9px;font-weight:500;white-space:nowrap;}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  .app{flex-direction:column;height:100dvh;}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;z-index:100;transform:translateX(-100%);transition:transform .28s var(--ease);}
  .sidebar.mob-open{transform:translateX(0);}
  .topbar{padding:0 14px;height:52px;}
  .tb-title{font-size:16px;}
  .chip{display:none;}
  .hamburger{display:flex;}
  .bell-wrap{display:none;}
  .content{padding:16px 14px 100px;}
  .s4{grid-template-columns:repeat(2,1fr);}
  .s3{grid-template-columns:repeat(2,1fr);}
  .s2{grid-template-columns:1fr;}
  .sgrid{gap:10px;margin-bottom:14px;}
  .dgrid{grid-template-columns:1fr;}
  .kanban{grid-template-columns:1fr;height:auto;}
  .kcards{max-height:300px;}
  .tw{overflow-x:auto;}
  table{min-width:580px;}
  .panel{width:100%;border-left:none;}
  .modal{max-width:100%;border-radius:var(--r) var(--r) 0 0;position:fixed;bottom:0;left:0;right:0;max-height:90dvh;}
  .modal-bg{align-items:flex-end;padding:0;}
  .fr{grid-template-columns:1fr;}
  .bottom-nav{display:block;}
  .pw{max-height:260px;}
  #backup-bar{left:0!important;padding:5px 12px!important;font-size:10px!important;}
  .meta-top{flex-direction:column;}
}
@media(max-width:400px){
  .s4{grid-template-columns:1fr 1fr;}
  .stat-val{font-size:20px;}
  .content{padding:12px 10px 100px;}
}
</style>

// ── Alertas ──
function buildAlerts(){
  const al=[];
  S.tasks.filter(t=>t.status!=='done').forEach(t=>{
    if(!t.due||t.due==='-')return;
    const[d,m]=t.due.split('/').map(Number);
    const diff=Math.ceil((new Date(2025,m-1,d)-new Date())/864e5);
    if(diff<0) al.push({tipo:'urgente',icon:'🔴',title:'Tarefa vencida',desc:`"${t.title}" — ${t.client}`,sub:`Venceu há ${Math.abs(diff)} dia(s)`});
    else if(diff<=2) al.push({tipo:'aviso',icon:'🟡',title:'Vence em breve',desc:`"${t.title}" — ${t.client}`,sub:`${diff===0?'Hoje!':'Em '+diff+' dia(s)'}`});
  });
  S.clients.filter(c=>c.payStatus==='pendente'&&c.status!=='finalizado').forEach(c=>
    al.push({tipo:'urgente',icon:'💰',title:`Pagamento pendente (${cobLabel[c.cobranca]||c.cobranca})`,desc:c.name,sub:`${fmt(c.contract)} em aberto`}));
  S.clients.filter(c=>c.payStatus==='parcial').forEach(c=>
    al.push({tipo:'aviso',icon:'💳',title:`Pagamento parcial (${cobLabel[c.cobranca]||c.cobranca})`,desc:c.name,sub:`Faltam ${fmt(c.contract-c.paid)}`}));
  S.clients.filter(c=>c.contractStatus==='nao_assinado'&&c.status!=='finalizado').forEach(c=>
    al.push({tipo:'aviso',icon:'📄',title:'Contrato não assinado',desc:c.name,sub:'Solicitar assinatura'}));
  S.events.forEach(ev=>{
    const diff=Math.ceil((new Date(2025,4,ev.day)-new Date())/864e5);
    if(diff>=0&&diff<=3) al.push({tipo:'info',icon:'📅',title:`${diff===0?'Hoje':'Em '+diff+' dia(s)'}`,desc:ev.title,sub:ev.client||''});
  });
  if(!al.length) al.push({tipo:'ok',icon:'✅',title:'Tudo em dia!',desc:'Nenhum alerta pendente.',sub:''});
  return al;
}

// ══ CALENDÁRIO ══
function rCal(){
  const y=S.calDate.getFullYear(),m=S.calDate.getMonth();
  const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),today=new Date();
  let cells='';
  for(let i=0;i<fd;i++)cells+=`<div class="cd dim"><div class="cdn" style="color:var(--lns)">${new Date(y,m,0).getDate()-fd+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const isT=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
    const evs=S.events.filter(e=>e.day===d);
    cells+=`<div class="cd ${isT?'tod':''}"><div class="cdn">${d}${isT?`<span class="tbadge">hoje</span>`:''}</div>${evs.slice(0,3).map(ev=>`<div class="cev ${evC[ev.type]}">${ev.title}</div>`).join('')}${evs.length>3?`<div style="font-size:9px;color:var(--t5)">+${evs.length-3}</div>`:''}</div>`;
  }
  const rem=(7-((fd+dim)%7))%7;for(let i=1;i<=rem;i++)cells+=`<div class="cd dim"><div class="cdn" style="color:var(--lns)">${i}</div></div>`;
  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn btn-ghost btn-sm" onclick="S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()-1,1);render()">◀</button>
      <span style="font-family:'Playfair Display',serif;font-size:19px;color:var(--f7);">${MN[m]} ${y}</span>
      <button class="btn btn-ghost btn-sm" onclick="S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()+1,1);render()">▶</button>
      <button class="btn btn-ghost btn-sm" onclick="S.calDate=new Date();render()">Hoje</button>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">${Object.entries(evC).map(([k,v])=>`<span class="cev ${v}" style="font-size:10.5px;">${k}</span>`).join('')}</div>
  </div>
  <div class="cg">${WD.map(d=>`<div class="chdr">${d}</div>`).join('')}${cells}</div>
  <div class="card" style="margin-top:14px;">
    <div class="card-hdr"><div class="card-title">Todos os eventos</div></div>
    ${S.events.map(ev=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--lns);">
      <div style="width:7px;height:7px;border-radius:50%;background:${evDot[ev.type]};flex-shrink:0;"></div>
      <div style="flex:1;"><span style="font-weight:500;font-size:13px;">${ev.title}</span>${ev.client?`<span style="font-size:11px;color:var(--t5);margin-left:5px;">· ${ev.client}</span>`:''}</div>
      <span style="font-size:12px;color:var(--t4);">Maio ${ev.day}</span>
      <span class="cev ${evC[ev.type]}" style="font-size:10px;">${ev.type}</span>
      <button onclick="S.events=S.events.filter(e=>e.id!==${ev.id});toast('Evento removido');render()" style="background:none;border:none;cursor:pointer;color:var(--t6);">✕</button>
    </div>`).join('')}
  </div>`;
}

      <div class="prow" style="padding:5px 0"><span class="pk">${c.cobranca==='avulso'?'Valor do projeto':'Contrato mensal'}</span><span class="pv">${fmt(c.contract)}${c.cobranca==='mensal'?'/mês':''}</span></div>

    <div class="orn">📝 Notas</div>
    <textarea class="narea" id="nt-${c.id}" placeholder="Anote preferências, senhas, acordos, prazos...">${c.notes||''}</textarea>

function svNote(cid){const el=$(`nt-${cid}`);if(!el)return;const c=S.clients.find(c=>c.id===cid);if(c){c.notes=el.value;salvarDados();updateSaveStatus();toast('✓ Nota salva!');}}

  return`
  <div class="sgrid s3">

    <div class="card"><div class="card-hdr"><div class="card-title">Despesas por categoria</div></div><div class="cwrap"><canvas id="fin-pie"></canvas></div></div>

  <div class="tw"><table>
    <thead><tr><th>Descrição</th><th>Cliente</th><th>Tipo</th><th>Data</th><th>Valor</th><th></th></tr></thead>

      <td style="color:var(--t5)">${t.date}</td>
      <td style="font-weight:700;font-family:'Playfair Display',serif;font-size:15px;color:${t.type==='entrada'?'var(--ok)':'var(--err)'}">${t.type==='entrada'?'+':'-'}${fmt(t.amount)}</td>
      <td><button onclick="S.transactions=S.transactions.filter(tx=>tx.id!==${t.id});Object.values(S.charts).forEach(c=>{try{c.destroy()}catch(e){}});S.charts={};toast('Removido');render()" style="background:none;border:none;cursor:pointer;color:var(--t6)">✕</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;

    {label:'Entradas',data:[4200,5100,10300],backgroundColor:'rgba(28,54,34,.72)',borderRadius:6},
    {label:'Saídas',data:[1400,1700,1965],backgroundColor:'rgba(248,113,113,.58)',borderRadius:6}]},

      <td><div class="prog" style="min-width:80px"><div class="prog-fill" style="width:${pct(c.paid,c.contract)}%"></div></div><div style="font-size:10px;color:var(--t5);margin-top:2px">${pct(c.paid,c.contract)}%</div></td>

  <div class="fr"><div class="fg"><label class="fl">Cliente</label><select class="fs" id="t-client"><option value="">Sem cliente</option>${S.clients.map(c=>`<option>${c.name}</option>`).join('')}</select></div><div class="fg"><label class="fl">Prioridade</label><select class="fs" id="t-pri"><option value="alta">Alta</option><option value="media" selected>Média</option><option value="baixa">Baixa</option></select></div></div>
  <div class="fr"><div class="fg"><label class="fl">Status</label><select class="fs" id="t-status"><option value="todo" ${s==='todo'?'selected':''}>A Fazer</option><option value="doing" ${s==='doing'?'selected':''}>Em Andamento</option><option value="done" ${s==='done'?'selected':''}>Concluído</option></select></div><div class="fg"><label class="fl">Data de entrega</label><input type="date" class="fi" id="t-due"></div></div>
  <div class="fr"><div class="fg"><label class="fl">Responsável</label><select class="fs" id="t-resp"><option value="">Sem responsável</option>${S.members.map(m=>`<option>${m}</option>`).join('')}</select></div><div class="fg"><label class="fl">Tags (vírgula)</label><input class="fi" id="t-tags" placeholder="design, urgente"></div></div>
  <input type="hidden" id="f-type" value="new-task">`;$('modal').classList.remove('hidden');}

function openEM(){$('mtitle').textContent='Novo Evento';$('mbody').innerHTML=`
  <div class="fg"><label class="fl">Título *</label><input class="fi" id="ev-t" placeholder="Ex: Cobertura casamento, Reunião..."></div>
  <div class="fr"><div class="fg"><label class="fl">Tipo</label><select class="fs" id="ev-type"><option value="evento">Evento/Cobertura</option><option value="entrega">Entrega</option><option value="reuniao">Reunião</option><option value="comemorativa">Data especial</option><option value="prazo">Prazo</option></select></div><div class="fg"><label class="fl">Dia do mês</label><input type="number" class="fi" id="ev-day" min="1" max="31" placeholder="1-31"></div></div>
  <div class="fg"><label class="fl">Cliente</label><select class="fs" id="ev-client"><option value="">Sem cliente</option>${S.clients.map(c=>`<option>${c.name}</option>`).join('')}</select></div>
  <input type="hidden" id="f-type" value="new-event">`;$('modal').classList.remove('hidden');}

function openTxM(){$('mtitle').textContent='Novo Lançamento';$('mbody').innerHTML=`
  <div class="fr"><div class="fg"><label class="fl">Tipo</label><select class="fs" id="tx-type"><option value="entrada">Entrada (recebimento)</option><option value="saida">Saída (despesa)</option></select></div><div class="fg"><label class="fl">Valor (R$) *</label><input type="number" step="0.01" class="fi" id="tx-val" placeholder="0,00"></div></div>
  <div class="fg"><label class="fl">Descrição *</label><input class="fi" id="tx-desc" placeholder="Ex: Mensalidade Bella Lash"></div>
  <div class="fr"><div class="fg"><label class="fl">Cliente</label><select class="fs" id="tx-client"><option value="">Interno</option>${S.clients.map(c=>`<option>${c.name}</option>`).join('')}</select></div><div class="fg"><label class="fl">Categoria</label><select class="fs" id="tx-cat"><option value="servico">📋 Serviço mensal</option><option value="evento">📸 Avulso / Evento</option><option value="trafego">Tráfego Pago</option><option value="ferramenta">Ferramentas</option><option value="equipe">Equipe</option><option value="equipamento">Equipamento</option><option value="outros">Outros</option></select></div></div>
  <div class="fg"><label class="fl">Data</label><input type="date" class="fi" id="tx-date" value="${new Date().toISOString().split('T')[0]}"></div>
  <input type="hidden" id="f-type" value="new-tx">`;$('modal').classList.remove('hidden');}

function handleAdd(){
  const p=S.page;
  if(p==='tarefas')openTM('todo');
  else if(p==='clientes'||p==='contratos'){$('mtitle').textContent='Novo Cliente';$('mbody').innerHTML=cForm(null);$('modal').classList.remove('hidden');}
  else if(p==='financeiro')openTxM();
  else if(p==='calendario')openEM();
  else openTM('todo');
}

function saveModal(){
  const type=$('f-type')?.value;
  if(type==='new-client'||type==='edit-client'){
    const name=$('f-name')?.value.trim();if(!name)return;
    const contract=parseFloat($('f-contract')?.value)||0,paid=parseFloat($('f-paid')?.value)||0;
    const svcs=Array.from(document.querySelectorAll('#f-svcs input:checked')).map(i=>i.value);
    if(type==='new-client'){
      S.clients.push({id:++S.nextId,name,contact:$('f-contact')?.value||'',phone:$('f-phone')?.value||'',services:svcs,cobranca:$('f-cob')?.value||'mensal',status:$('f-status')?.value||'ativo',contract,paid,payStatus:$('f-pay')?.value||'pendente',contractStatus:$('f-cs')?.value||'nao_assinado',resp:$('f-resp')?.value||'',notes:$('f-notes')?.value||''});
      toast('✓ Cliente adicionado!');
    }else{
      const c=S.clients.find(c=>c.id===parseInt($('f-id')?.value));
      if(c){c.name=name;c.contact=$('f-contact')?.value||'';c.phone=$('f-phone')?.value||'';c.services=svcs;c.cobranca=$('f-cob')?.value||'mensal';c.status=$('f-status')?.value||'ativo';c.contract=contract;c.paid=paid;c.payStatus=$('f-pay')?.value||'pendente';c.contractStatus=$('f-cs')?.value||'nao_assinado';c.resp=$('f-resp')?.value||'';c.notes=$('f-notes')?.value||'';}
      toast('✓ Atualizado!');
    }
  }else if(type==='new-task'){
    const title=$('t-title')?.value.trim();if(!title)return;
    const due=$('t-due')?.value,tags=($('t-tags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean);
    S.tasks.push({id:++S.nextId,title,desc:$('t-desc')?.value||'',client:$('t-client')?.value||'',priority:$('t-pri')?.value||'media',status:$('t-status')?.value||'todo',due:due?due.split('-').slice(1).reverse().join('/'):'-',tags,resp:$('t-resp')?.value||''});
    toast('✓ Tarefa adicionada!');
  }else if(type==='new-tx'){
    const desc=$('tx-desc')?.value.trim(),amount=parseFloat($('tx-val')?.value);if(!desc||!amount)return;
    const raw=$('tx-date')?.value,date=raw?raw.split('-').reverse().join('/'):new Date().toLocaleDateString('pt-BR');
    S.transactions.push({id:++S.nextId,type:$('tx-type')?.value||'entrada',desc,client:$('tx-client')?.value||'',cat:$('tx-cat')?.value||'servico',amount,date});
    toast('✓ Lançamento registrado!');
  }else if(type==='new-event'){
    const title=$('ev-t')?.value.trim(),day=parseInt($('ev-day')?.value);if(!title||!day)return;
    S.events.push({id:++S.nextId,day,title,type:$('ev-type')?.value||'evento',client:$('ev-client')?.value||''});
    S.events.sort((a,b)=>a.day-b.day);toast('✓ Evento adicionado!');
  }
  closeModal();render();
  salvarDados();
  updateSaveStatus();
}

function closeModal(){$('modal').classList.add('hidden');}
function openPanel(){$('panel').classList.add('open');$('pbg').classList.add('open');}
function closePanel(){$('panel').classList.remove('open');$('pbg').classList.remove('open');}

// ══════════════════════════════════════════════
// 💾 SISTEMA DE SALVAMENTO — localStorage
// Salva automaticamente toda vez que algo muda.
// Carrega os dados ao abrir o sistema.
// ══════════════════════════════════════════════

const STORAGE_KEY = 'flow_dados_v6';

// Salva os dados do usuário (não sobrescreve o código)
function salvarDados() {
  try {
    const dados = {
      version: 6,
      savedAt: new Date().toISOString(),
      clients: S.clients,
      tasks: S.tasks,
      transactions: S.transactions,
      events: S.events,
      checklists: S.checklists,
      planner: S.planner,
      metaMes: S.metaMes,
      nextId: S.nextId,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
  } catch(e) {
    console.warn('Erro ao salvar:', e);
  }
}

// Carrega os dados salvos (se existir)
function carregarDados() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const dados = JSON.parse(raw);
    if (!dados || dados.version !== 6) return false;

    // Restaura apenas os dados, mantém o código atualizado
    S.clients      = dados.clients      || S.clients;
    S.tasks        = dados.tasks        || S.tasks;
    S.transactions = dados.transactions || S.transactions;
    S.events       = dados.events       || S.events;
    S.checklists   = dados.checklists   || S.checklists;
    S.planner      = dados.planner      || S.planner;
    S.metaMes      = dados.metaMes      || S.metaMes;
    S.nextId       = dados.nextId       || S.nextId;
    return true;
  } catch(e) {
    console.warn('Erro ao carregar:', e);
    return false;
  }
}

// Exporta backup em JSON (para guardar antes de atualizar o sistema)
function exportarBackup() {
  const dados = localStorage.getItem(STORAGE_KEY);
  if (!dados) { toast('Nenhum dado salvo ainda'); return; }
  const blob = new Blob([dados], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `flow-backup-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();
  toast('✓ Backup baixado!');
}

// Importa backup JSON (restaura após atualizar o sistema)
function importarBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const dados = JSON.parse(ev.target.result);
        if (!dados.clients) { toast('❌ Arquivo inválido'); return; }
        localStorage.setItem(STORAGE_KEY, ev.target.result);
        carregarDados();
        toast('✓ Dados restaurados com sucesso!');
        render();
      } catch(e) { toast('❌ Erro ao importar o arquivo'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Limpar todos os dados (com confirmação dupla)
function limparDados() {
  if (!confirm('⚠️ Isso vai apagar TODOS os dados salvos. Tem certeza?')) return;
  if (!confirm('Última confirmação: apagar tudo mesmo?')) return;
  localStorage.removeItem(STORAGE_KEY);
  toast('Dados apagados. Recarregue a página.');
}

// ── Salva após render e saveModal sem loop infinito ──
// A função render() original já existe no código acima.
// Aqui apenas adicionamos o auto-save nos pontos certos.

// ── BARRA DE BACKUP (aparece no rodapé do sistema) ──
function injectBackupBar() {
  const bar = document.createElement('div');
  bar.id = 'backup-bar';
  bar.style.cssText = `
    position:fixed;bottom:0;left:var(--sb);right:0;
    background:rgba(253,250,246,.97);
    border-top:1px solid var(--lns);
    padding:6px 28px;
    display:flex;align-items:center;justify-content:space-between;
    z-index:50;font-size:11.5px;color:var(--t5);
    backdrop-filter:blur(8px);
  `;
  bar.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;box-shadow:0 0 5px rgba(34,197,94,.5);"></span>
      <span id="save-status">Dados salvos automaticamente no navegador</span>
    </div>
    <div style="display:flex;gap:6px;">
      <button onclick="exportarBackup()" style="background:none;border:1px solid var(--ln);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;color:var(--t4);font-family:'Outfit',sans-serif;" title="Baixar backup antes de atualizar o sistema">
        ⬇ Exportar backup
      </button>
      <button onclick="importarBackup()" style="background:none;border:1px solid var(--ln);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;color:var(--t4);font-family:'Outfit',sans-serif;" title="Restaurar backup após atualizar">
        ⬆ Importar backup
      </button>
      <button onclick="limparDados()" style="background:none;border:1px solid #fecaca;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;color:#dc2626;font-family:'Outfit',sans-serif;" title="Apagar todos os dados">
        🗑
      </button>
    </div>
  `;
  document.body.appendChild(bar);
  // Adiciona padding no content para não ficar atrás da barra
  document.querySelector('.content').style.paddingBottom = '50px';
}

function updateSaveStatus() {
  const el = $('save-status');
  if (!el) return;
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    const dt = new Date(d.savedAt);
    el.textContent = `✓ Salvo às ${dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} — ${S.clients.length} clientes · ${S.tasks.filter(t=>t.status!=='done').length} tarefas em aberto`;
  } catch(e) {}
}

// ── INIT ──
const now = new Date();
const WDN = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
$('tbdate').textContent = `${WDN[now.getDay()]}, ${now.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'})}`;

// Carrega dados salvos (se tiver) ou usa os dados de exemplo
const temDadosSalvos = carregarDados();
injectBackupBar();

// Render inicial
render();
salvarDados();
updateSaveStatus();

// Atualiza status a cada 30s
setInterval(updateSaveStatus, 30000);

// Avisa se tentar fechar sem salvar (proteção extra)
window.addEventListener('beforeunload', () => salvarDados());

if (!temDadosSalvos) {
  setTimeout(()=>toast('💾 Sistema iniciado! Seus dados serão salvos automaticamente.'), 800);
} else {
  setTimeout(()=>toast('✓ Dados carregados do navegador!'), 400);
}

// ══════════════════════════════════════════════
// 📱 MOBILE — Menu hamburguer e navegação
// ══════════════════════════════════════════════

function toggleMobileMenu(){
  const sidebar = document.querySelector('.sidebar');
  const overlay = $('mob-overlay');
  const ham = $('hamburger');
  const isOpen = sidebar.classList.contains('mob-open');
  if(isOpen){ closeMobileMenu(); }
  else {
    sidebar.classList.add('mob-open');
    overlay.classList.add('open');
    ham?.classList.add('open');
  }
}

function closeMobileMenu(){
  document.querySelector('.sidebar')?.classList.remove('mob-open');
  $('mob-overlay')?.classList.remove('open');
  $('hamburger')?.classList.remove('open');
}

function setBottomNav(page){
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const el = $('bn-'+page);
  if(el) el.classList.add('active');
}

// Sync bottom nav ao navegar (sem redefinir go)
function syncMobileNav(page){
  closeMobileMenu();
  const map = {dashboard:'dashboard',tarefas:'tarefas',clientes:'clientes',financeiro:'financeiro'};
  if(map[page]) setBottomNav(map[page]);
}

// Fecha menu ao apertar ESC
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeMobileMenu(); });

// Detecta swipe para fechar sidebar
let touchStartX = 0;
document.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(dx < -60) closeMobileMenu(); // swipe esquerda fecha
}, {passive:true});

</script>
